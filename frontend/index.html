<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/Public.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Parsi Markt | Home</title>
  </head>
  <body>
    <!-- هدر سایت -->
    <header id="header">
      <!-- سبد خرید \ سمت چپ -->
      <div class="icon-lest-header icon-color"><i class="fas fa-cart-shopping"></i></div>
      <!-- باکس وسط -->
      <div class="lest-item">
        <!-- پوشاک -->
        <div class="icon-lest-header"><i class="fas fa-tshirt"></i></div>
        <!-- خدمات مجازی -->
        <div class="icon-lest-header"><i class="fas fa-globe"></i></div>
        <!-- خدمات دیجیتال -->
        <div class="icon-lest-header"><i class="fas fa-laptop"></i></div>
      </div>
      <!-- پشتیانی \ سمت راست -->
      <div class="icon-lest-header icon-color"><i class="fas fa-headset"></i></div>
    </header>
    <!-- صفحه اصلی سایت -->
    <main id="main"></main>
    <!-- اتصال جاوا اسکریپت -->
    <script src="./js/main.js"></script>
  </body>
</html>
